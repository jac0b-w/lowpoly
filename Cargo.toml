[package]
name = "lowpoly"
version = "0.1.0"
edition = "2024"

[dependencies]
image = "0.25.8"
imageproc = "0.26"
libblur = { version = "0.23", features = ["image"] }
rand = "0.10"
rayon = "1.10"
spade = "2.0"
thiserror = "2.0"


[dev-dependencies]
criterion = "0.8"

[[bench]]
name = "lowpoly_benches"
harness = false

[lib]
name = "lowpoly"
path = "src/lib.rs"
crate-type = ["rlib"]

[package]
name = "lowpoly"
version = "0.1.0"
edition = "2024"

[dependencies]
image = "0.25.10"
imageproc = "0.26.1"
libblur = { version = "0.23.3", features = ["image"] }
rand = "0.10.1"
rayon = "1.12.0"
spade = "2.15.1"
thiserror = "2.0.18"

[dev-dependencies]
criterion = "0.8.2"

[profile.release]
debug = true
strip = false

[[bench]]
name = "lowpoly_benches"
harness = false
